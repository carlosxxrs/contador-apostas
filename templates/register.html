<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Gerenciador de Apostas</title>
    <style>
        body { background-color: #121214; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: #202024; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #29292e; background: #121214; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #04d361; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0ee96f; }
        a { color: #a8a8b3; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Criar Nova Conta</h2>
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Escolha um Usuário" required>
            <input type="password" name="password" placeholder="Crie uma Senha" required>
            <button type="submit">Cadastrar e Salvar</button>
        </form>
        <a href="/login">Já tem uma conta? Faça login</a>
    </div>
</body>
</html>
